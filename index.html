<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1.0,
        viewport-fit=cover
    "
>

<title>ShadowGuide</title>


<style>


/* =============================
   基本
============================= */


html,
body {

    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    overflow: hidden;

    background: black;

    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        Arial,
        sans-serif;

}



/* =============================
   カメラ
============================= */


#camera {

    position: fixed;

    top: 0;
    left: 0;

    width: 100vw;
    height: 100vh;

    object-fit: cover;

    z-index: 0;

}



/* =============================
   操作パネル
============================= */


#panel {

    position: fixed;

    z-index: 20;

    box-sizing: border-box;

    background:
        rgba(0, 0, 0, 0.72);

    color: white;

    backdrop-filter:
        blur(5px);

    -webkit-backdrop-filter:
        blur(5px);

}



#topRow {

    display: flex;

    align-items: center;

    justify-content:
        space-between;

    gap: 10px;

}



#title {

    font-size: 21px;

    font-weight: 700;

    white-space: nowrap;

}



#buttons {

    display: flex;

    gap: 8px;

}



button {

    padding:
        9px 13px;

    border: none;

    border-radius: 9px;

    background: white;

    color: black;

    font-size: 14px;

    font-weight: 700;

    white-space: nowrap;

}



button:disabled {

    opacity: 0.4;

}



#status {

    margin-top: 8px;

    font-size: 13px;

    line-height: 1.4;

    opacity: 0.9;

}



/* =============================
   結果表示
============================= */


#results {

    display: flex;

    gap: 16px;

    margin-top: 8px;

}



.resultBox {

    min-width: 0;

}



.resultLabel {

    margin-bottom: 2px;

    font-size: 11px;

    opacity: 0.72;

}



.resultValue {

    font-size: 19px;

    font-weight: 700;

    white-space: nowrap;

}



/* =============================
   評価領域
============================= */


#evaluationArea {

    position: fixed;

    z-index: 10;

    box-sizing: border-box;

    border:
        4px solid yellow;

    pointer-events: none;

}



#areaLabel {

    position: absolute;

    top: -29px;
    left: -4px;

    color: yellow;

    font-size: 16px;

    font-weight: 700;

    text-shadow:
        0 0 4px black,
        0 0 4px black,
        0 0 4px black;

}



/* =============================
   十字マーク
============================= */


#crosshair {

    position: absolute;

    top: 50%;
    left: 50%;

    width: 34px;
    height: 34px;

    transform:
        translate(-50%, -50%);

}



#crosshair::before {

    content: "";

    position: absolute;

    top: 50%;
    left: 0;

    width: 100%;
    height: 2px;

    transform:
        translateY(-50%);

    background: red;

    box-shadow:
        0 0 3px black;

}



#crosshair::after {

    content: "";

    position: absolute;

    top: 0;
    left: 50%;

    width: 2px;
    height: 100%;

    transform:
        translateX(-50%);

    background: red;

    box-shadow:
        0 0 3px black;

}



/* =============================
   下部メッセージ
============================= */


#message {

    position: fixed;

    z-index: 15;

    box-sizing: border-box;

    padding:
        8px 14px;

    border-radius:
        10px;

    background:
        rgba(0, 0, 0, 0.72);

    color: white;

    font-size: 16px;

    font-weight: 700;

    text-align: center;

    pointer-events: none;

}



/* =============================
   Canvas
============================= */


#analysisCanvas {

    display: none;

}



/* =============================
   縦画面
============================= */


@media
(orientation: portrait) {


    #panel {

        top: 0;
        left: 0;

        width: 100%;

        padding:
            calc(
                10px +
                env(safe-area-inset-top)
            )
            14px
            10px
            14px;

    }



    #evaluationArea {

        width:
            min(62vw, 280px);

        height:
            min(62vw, 280px);

        left: 50%;

        top: 55%;

        transform:
            translate(-50%, -50%);

    }



    #message {

        left: 50%;

        top:
            calc(
                55% +
                min(31vw, 140px) +
                18px
            );

        transform:
            translateX(-50%);

        min-width:
            220px;

    }

}



/* =============================
   横画面
============================= */


@media
(orientation: landscape) {


    #panel {

        top: 0;
        left: 0;

        width: 250px;

        height: 100%;

        padding:
            calc(
                12px +
                env(safe-area-inset-top)
            )
            14px
            calc(
                12px +
                env(safe-area-inset-bottom)
            )
            calc(
                14px +
                env(safe-area-inset-left)
            );

    }



    #topRow {

        display: block;

    }



    #buttons {

        margin-top: 12px;

        display: block;

    }



    button {

        display: block;

        width: 100%;

        margin-bottom: 8px;

    }



    #results {

        display: block;

        margin-top: 14px;

    }



    .resultBox {

        margin-bottom: 10px;

    }



    #evaluationArea {

        width:
            min(42vh, 270px);

        height:
            min(42vh, 270px);

        left:
            calc(
                250px +
                (
                    100vw -
                    250px
                ) / 2
            );

        top: 48%;

        transform:
            translate(-50%, -50%);

    }



    #message {

        left:
            calc(
                250px +
                (
                    100vw -
                    250px
                ) / 2
            );

        top:
            calc(
                48% +
                min(21vh, 135px) +
                18px
            );

        transform:
            translateX(-50%);

        min-width:
            220px;

    }

}



/* =============================
   小型横画面
============================= */


@media
(orientation: landscape)
and
(max-height: 500px) {


    #panel {

        width: 220px;

    }



    #title {

        font-size: 18px;

    }



    button {

        padding:
            7px 10px;

        font-size: 13px;

    }



    #status {

        font-size: 11px;

    }



    .resultValue {

        font-size: 16px;

    }



    #evaluationArea {

        width:
            min(48vh, 220px);

        height:
            min(48vh, 220px);

        left:
            calc(
                220px +
                (
                    100vw -
                    220px
                ) / 2
            );

    }



    #message {

        left:
            calc(
                220px +
                (
                    100vw -
                    220px
                ) / 2
            );

        top: auto;

        bottom:
            calc(
                8px +
                env(
                    safe-area-inset-bottom
                )
            );

        padding:
            6px 12px;

        font-size:
            14px;

    }

}


</style>

</head>



<body>



<video

    id="camera"

    autoplay

    playsinline

    muted

></video>



<div id="panel">


    <div id="topRow">


        <div id="title">

            ShadowGuide

        </div>



        <div id="buttons">


            <button
                id="baselineButton"
            >

                基準を記録

            </button>



            <button

                id="measureButton"

                disabled

            >

                測定

            </button>


        </div>


    </div>



    <div id="status">

        ① 手とペンを外して基準を記録してください。

    </div>



    <div id="results">


        <div class="resultBox">


            <div class="resultLabel">

                暗部面積率

            </div>


            <div

                class="resultValue"

                id="darkAreaRate"

            >

                ---

            </div>


        </div>



        <div class="resultBox">


            <div class="resultLabel">

                平均低下率

            </div>


            <div

                class="resultValue"

                id="averageDropRate"

            >

                ---

            </div>


        </div>


    </div>


</div>



<div id="evaluationArea">


    <div id="areaLabel">

        評価領域

    </div>



    <div id="crosshair"></div>


</div>



<div id="message">

    手・ペンなしで基準を記録

</div>



<canvas
    id="analysisCanvas"
></canvas>



<script>



/* =============================
   予備実験用パラメータ
============================= */


/*

基準画像より20%以上暗くなった画素を
「暗部」と判定する。

0.20 → 20%
0.15 → 15%
0.10 → 10%

*/

const DARK_THRESHOLD =
    0.20;



/*

解析画像サイズ。

大きくすると精細になるが
スマホ処理が重くなる。

*/

const ANALYSIS_SIZE =
    180;



/* =============================
   要素取得
============================= */


const video =

    document.getElementById(
        "camera"
    );


const evaluationArea =

    document.getElementById(
        "evaluationArea"
    );


const canvas =

    document.getElementById(
        "analysisCanvas"
    );


const ctx =

    canvas.getContext(

        "2d",

        {

            willReadFrequently:
                true

        }

    );


const baselineButton =

    document.getElementById(
        "baselineButton"
    );


const measureButton =

    document.getElementById(
        "measureButton"
    );


const darkAreaRateDisplay =

    document.getElementById(
        "darkAreaRate"
    );


const averageDropRateDisplay =

    document.getElementById(
        "averageDropRate"
    );


const statusDisplay =

    document.getElementById(
        "status"
    );


const messageDisplay =

    document.getElementById(
        "message"
    );



/* =============================
   データ
============================= */


let baselineBrightnessArray =
    null;



/* =============================
   カメラ起動
============================= */


async function startCamera() {


    try {


        const stream =

            await navigator.mediaDevices
                .getUserMedia({


                    video: {


                        facingMode: {

                            ideal:
                                "environment"

                        }


                    },


                    audio: false


                });



        video.srcObject =
            stream;



        await video.play();



    }


    catch(error) {


        alert(

            "カメラを起動できませんでした。\n" +

            "カメラの使用を許可してください。"

        );


        console.error(
            error
        );


    }


}



/* =============================
   object-fit: cover 対応

   画面上の評価領域
   ↓
   元のカメラ画像座標
============================= */


function screenRectToVideoRect(

    screenRect

) {


    const videoWidth =

        video.videoWidth;


    const videoHeight =

        video.videoHeight;


    const screenWidth =

        window.innerWidth;


    const screenHeight =

        window.innerHeight;



    const scale =

        Math.max(

            screenWidth /
            videoWidth,

            screenHeight /
            videoHeight

        );



    const displayedWidth =

        videoWidth *
        scale;


    const displayedHeight =

        videoHeight *
        scale;



    const cropX =

        (

            displayedWidth -

            screenWidth

        ) / 2;


    const cropY =

        (

            displayedHeight -

            screenHeight

        ) / 2;



    let sourceX =

        (

            screenRect.left +

            cropX

        ) / scale;


    let sourceY =

        (

            screenRect.top +

            cropY

        ) / scale;


    let sourceWidth =

        screenRect.width /
        scale;


    let sourceHeight =

        screenRect.height /
        scale;



    sourceX =

        Math.max(

            0,

            Math.min(

                sourceX,

                videoWidth - 1

            )

        );


    sourceY =

        Math.max(

            0,

            Math.min(

                sourceY,

                videoHeight - 1

            )

        );


    sourceWidth =

        Math.min(

            sourceWidth,

            videoWidth -
            sourceX

        );


    sourceHeight =

        Math.min(

            sourceHeight,

            videoHeight -
            sourceY

        );



    return {


        x:
            sourceX,


        y:
            sourceY,


        width:
            sourceWidth,


        height:
            sourceHeight


    };


}



/* =============================
   評価領域画像を取得
============================= */


function captureEvaluationArea() {


    if (

        video.readyState < 2 ||

        video.videoWidth === 0

    ) {


        return null;


    }



    const screenRect =

        evaluationArea
            .getBoundingClientRect();



    const sourceRect =

        screenRectToVideoRect(

            screenRect

        );



    canvas.width =

        ANALYSIS_SIZE;


    canvas.height =

        ANALYSIS_SIZE;



    ctx.drawImage(


        video,


        sourceRect.x,

        sourceRect.y,

        sourceRect.width,

        sourceRect.height,


        0,

        0,

        ANALYSIS_SIZE,

        ANALYSIS_SIZE


    );



    return ctx.getImageData(


        0,

        0,

        ANALYSIS_SIZE,

        ANALYSIS_SIZE


    );


}



/* =============================
   RGB → 輝度配列
============================= */


function imageDataToBrightnessArray(

    imageData

) {


    const data =

        imageData.data;


    const brightnessArray =

        new Float32Array(

            ANALYSIS_SIZE *

            ANALYSIS_SIZE

        );



    let pixelIndex = 0;



    for (

        let i = 0;

        i < data.length;

        i += 4

    ) {


        const r =
            data[i];


        const g =
            data[i + 1];


        const b =
            data[i + 2];



        brightnessArray[
            pixelIndex
        ] =


            0.2126 * r +

            0.7152 * g +

            0.0722 * b;



        pixelIndex++;


    }



    return brightnessArray;


}



/* =============================
   基準画像記録
============================= */


baselineButton
    .addEventListener(

        "click",

        () => {


            const imageData =

                captureEvaluationArea();



            if (!imageData) {


                alert(

                    "カメラ画像を取得できません。"

                );


                return;


            }



            baselineBrightnessArray =

                imageDataToBrightnessArray(

                    imageData

                );



            measureButton.disabled =

                false;



            darkAreaRateDisplay
                .textContent =

                "---";


            averageDropRateDisplay
                .textContent =

                "---";



            statusDisplay
                .textContent =

                "② ペン先を十字に合わせて書字姿勢をとり、「測定」を押してください。";



            messageDisplay
                .textContent =

                "ペン先を十字に合わせて測定";


        }

    );



/* =============================
   測定
============================= */


measureButton
    .addEventListener(

        "click",

        () => {


            if (

                baselineBrightnessArray ===
                null

            ) {


                return;


            }



            const imageData =

                captureEvaluationArea();



            if (!imageData) {


                alert(

                    "カメラ画像を取得できません。"

                );


                return;


            }



            const measuredBrightnessArray =

                imageDataToBrightnessArray(

                    imageData

                );



            analyzeDifference(

                baselineBrightnessArray,

                measuredBrightnessArray

            );


        }

    );



/* =============================
   基準画像と測定画像の比較
============================= */


function analyzeDifference(

    baseline,

    measured

) {


    let darkPixelCount = 0;


    let darkPixelDropTotal = 0;



    const totalPixelCount =

        baseline.length;



    for (

        let i = 0;

        i < totalPixelCount;

        i++

    ) {


        const baseBrightness =

            baseline[i];


        const measuredBrightness =

            measured[i];



        /*

        極端に暗い基準画素では
        割合計算が不安定なので除外

        */

        if (

            baseBrightness < 10

        ) {


            continue;


        }



        const dropRate =


            (

                baseBrightness -

                measuredBrightness

            )

            /

            baseBrightness;



        if (

            dropRate >=
            DARK_THRESHOLD

        ) {


            darkPixelCount++;


            darkPixelDropTotal +=

                dropRate;


        }


    }



    const darkAreaRate =


        darkPixelCount

        /

        totalPixelCount

        *

        100;



    let averageDropRate =

        0;



    if (

        darkPixelCount > 0

    ) {


        averageDropRate =


            darkPixelDropTotal

            /

            darkPixelCount

            *

            100;


    }



    darkAreaRateDisplay
        .textContent =

        darkAreaRate
            .toFixed(1)

        +

        " %";



    averageDropRateDisplay
        .textContent =

        averageDropRate
            .toFixed(1)

        +

        " %";



    statusDisplay
        .textContent =

        "測定完了。照明位置を変える場合は、その条件で再度「基準を記録」してください。";



    messageDisplay
        .textContent =

        "測定完了";


}



/* =============================
   画面回転
============================= */


window.addEventListener(

    "orientationchange",

    () => {


        setTimeout(

            () => {


                window.scrollTo(

                    0,

                    0

                );


            },

            300

        );


    }

);



/* =============================
   開始
============================= */


startCamera();



</script>


</body>

</html>

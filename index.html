<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
>

<title>ShadowGuide</title>

<style>

html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        Arial,
        sans-serif;
}


/* =============================
   カメラ
============================= */

#camera {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 0;
}


/* =============================
   操作パネル
============================= */

#panel {
    position: fixed;
    z-index: 20;
    box-sizing: border-box;
    background: rgba(0, 0, 0, 0.72);
    color: white;

    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
}


#title {
    font-size: 21px;
    font-weight: 700;
}


#actionButton {
    margin-top: 10px;

    padding: 10px 15px;

    width: 100%;

    border: none;
    border-radius: 9px;

    background: white;
    color: black;

    font-size: 15px;
    font-weight: 700;
}


#status {
    margin-top: 8px;

    font-size: 13px;
    line-height: 1.4;

    opacity: 0.9;
}


/* =============================
   数値結果
============================= */

#results {
    display: flex;

    gap: 16px;

    margin-top: 10px;
}


.resultBox {
    min-width: 0;
}


.resultLabel {
    margin-bottom: 2px;

    font-size: 11px;

    opacity: 0.72;
}


.resultValue {
    font-size: 18px;
    font-weight: 700;

    white-space: nowrap;
}


/* =============================
   判定結果
============================= */

#judgementBox {
    display: none;

    margin-top: 12px;

    padding: 12px;

    border: 2px solid white;
    border-radius: 10px;

    text-align: center;
}


#judgementLabel {
    font-size: 12px;

    opacity: 0.75;
}


#judgement {
    margin-top: 4px;

    font-size: 25px;
    font-weight: 800;
}


#scoreDisplay {
    margin-top: 4px;

    font-size: 13px;

    opacity: 0.8;
}


/* =============================
   評価領域
============================= */

#evaluationArea {
    position: fixed;

    z-index: 10;

    box-sizing: border-box;

    border: 4px solid yellow;

    pointer-events: none;
}


#areaLabel {
    position: absolute;

    top: -29px;
    left: -4px;

    color: yellow;

    font-size: 16px;
    font-weight: 700;

    text-shadow:
        0 0 4px black,
        0 0 4px black,
        0 0 4px black;
}


/* =============================
   十字マーク
============================= */

#crosshair {
    position: absolute;

    top: 50%;
    left: 50%;

    width: 34px;
    height: 34px;

    transform: translate(-50%, -50%);
}


#crosshair::before {
    content: "";

    position: absolute;

    top: 50%;
    left: 0;

    width: 100%;
    height: 2px;

    transform: translateY(-50%);

    background: red;

    box-shadow: 0 0 3px black;
}


#crosshair::after {
    content: "";

    position: absolute;

    top: 0;
    left: 50%;

    width: 2px;
    height: 100%;

    transform: translateX(-50%);

    background: red;

    box-shadow: 0 0 3px black;
}


/* =============================
   下部メッセージ
============================= */

#message {
    position: fixed;

    z-index: 15;

    box-sizing: border-box;

    padding: 8px 14px;

    border-radius: 10px;

    background: rgba(0, 0, 0, 0.72);

    color: white;

    font-size: 16px;
    font-weight: 700;

    text-align: center;

    pointer-events: none;
}


/* =============================
   Canvas
============================= */

#analysisCanvas {
    display: none;
}


/* =============================
   縦画面
============================= */

@media (orientation: portrait) {

    #panel {
        top: 0;
        left: 0;

        width: 100%;

        padding:
            calc(10px + env(safe-area-inset-top))
            14px
            10px
            14px;
    }


    #evaluationArea {
        width: min(62vw, 280px);
        height: min(62vw, 280px);

        left: 50%;
        top: 57%;

        transform: translate(-50%, -50%);
    }


    #message {
        left: 50%;

        top:
            calc(
                57% +
                min(31vw, 140px) +
                18px
            );

        transform: translateX(-50%);

        min-width: 220px;
    }

}


/* =============================
   横画面
============================= */

@media (orientation: landscape) {

    #panel {
        top: 0;
        left: 0;

        width: 250px;
        height: 100%;

        padding:
            calc(12px + env(safe-area-inset-top))
            14px
            calc(12px + env(safe-area-inset-bottom))
            calc(14px + env(safe-area-inset-left));
    }


    #results {
        display: block;
    }


    .resultBox {
        margin-bottom: 9px;
    }


    #evaluationArea {
        width: min(42vh, 270px);
        height: min(42vh, 270px);

        left:
            calc(
                250px +
                (100vw - 250px) / 2
            );

        top: 48%;

        transform: translate(-50%, -50%);
    }


    #message {
        left:
            calc(
                250px +
                (100vw - 250px) / 2
            );

        top:
            calc(
                48% +
                min(21vh, 135px) +
                18px
            );

        transform: translateX(-50%);

        min-width: 220px;
    }

}


/* =============================
   小型横画面
============================= */

@media
(orientation: landscape)
and
(max-height: 500px) {

    #panel {
        width: 220px;
    }


    #title {
        font-size: 18px;
    }


    #actionButton {
        padding: 7px 10px;

        font-size: 13px;
    }


    #status {
        font-size: 11px;
    }


    .resultValue {
        font-size: 16px;
    }


    #judgement {
        font-size: 20px;
    }


    #evaluationArea {
        width: min(48vh, 220px);
        height: min(48vh, 220px);

        left:
            calc(
                220px +
                (100vw - 220px) / 2
            );
    }


    #message {
        left:
            calc(
                220px +
                (100vw - 220px) / 2
            );

        top: auto;

        bottom:
            calc(
                8px +
                env(safe-area-inset-bottom)
            );

        padding: 6px 12px;

        font-size: 14px;
    }

}

</style>
</head>


<body>


<video
    id="camera"
    autoplay
    playsinline
    muted
></video>


<div id="panel">

    <div id="title">
        ShadowGuide
    </div>


    <button id="actionButton">
        基準を測定
    </button>


    <div id="status">
        手とペンを外して基準を測定してください。
    </div>


    <div id="results">

        <div class="resultBox">

            <div class="resultLabel">
                暗部面積率
            </div>

            <div
                class="resultValue"
                id="darkAreaRate"
            >
                ---
            </div>

        </div>


        <div class="resultBox">

            <div class="resultLabel">
                平均低下率
            </div>

            <div
                class="resultValue"
                id="averageDropRate"
            >
                ---
            </div>

        </div>

    </div>


    <div id="judgementBox">

        <div id="judgementLabel">
            暫定判定
        </div>

        <div id="judgement">
            ---
        </div>

        <div id="scoreDisplay">
            影響スコア：---
        </div>

    </div>

</div>



<div id="evaluationArea">

    <div id="areaLabel">
        評価領域
    </div>

    <div id="crosshair"></div>

</div>



<div id="message">
    手・ペンなしで基準を測定
</div>



<canvas id="analysisCanvas"></canvas>



<script>


/* =============================
   予備実験用パラメータ
============================= */


/*

基準画像より20%以上暗くなった画素を
「暗部」と判定

*/

const DARK_THRESHOLD = 0.20;


/*

影響スコア判定

*/

const SMALL_SCORE_THRESHOLD = 10;

const LARGE_SCORE_THRESHOLD = 25;


/*

解析画像サイズ

*/

const ANALYSIS_SIZE = 180;



/* =============================
   要素取得
============================= */


const video =
    document.getElementById("camera");


const evaluationArea =
    document.getElementById("evaluationArea");


const canvas =
    document.getElementById("analysisCanvas");


const ctx =
    canvas.getContext(
        "2d",
        {
            willReadFrequently: true
        }
    );


const actionButton =
    document.getElementById("actionButton");


const darkAreaRateDisplay =
    document.getElementById("darkAreaRate");


const averageDropRateDisplay =
    document.getElementById("averageDropRate");


const statusDisplay =
    document.getElementById("status");


const messageDisplay =
    document.getElementById("message");


const judgementBox =
    document.getElementById("judgementBox");


const judgementDisplay =
    document.getElementById("judgement");


const scoreDisplay =
    document.getElementById("scoreDisplay");



/* =============================
   状態管理
============================= */


/*

baseline
↓
measure
↓
result

*/

let currentState = "baseline";


let baselineBrightnessArray = null;



/* =============================
   カメラ起動
============================= */


async function startCamera() {

    try {

        const stream =
            await navigator.mediaDevices
                .getUserMedia({

                    video: {

                        facingMode: {
                            ideal: "environment"
                        }

                    },

                    audio: false

                });


        video.srcObject = stream;


        await video.play();

    }

    catch(error) {

        alert(
            "カメラを起動できませんでした。\n" +
            "カメラの使用を許可してください。"
        );


        console.error(error);

    }

}



/* =============================
   画面座標
   ↓
   カメラ元画像座標

   object-fit: cover 対応
============================= */


function screenRectToVideoRect(screenRect) {

    const videoWidth =
        video.videoWidth;


    const videoHeight =
        video.videoHeight;


    const screenWidth =
        window.innerWidth;


    const screenHeight =
        window.innerHeight;


    const scale =
        Math.max(

            screenWidth / videoWidth,

            screenHeight / videoHeight

        );


    const displayedWidth =
        videoWidth * scale;


    const displayedHeight =
        videoHeight * scale;


    const cropX =
        (
            displayedWidth -
            screenWidth
        ) / 2;


    const cropY =
        (
            displayedHeight -
            screenHeight
        ) / 2;


    let sourceX =
        (
            screenRect.left +
            cropX
        ) / scale;


    let sourceY =
        (
            screenRect.top +
            cropY
        ) / scale;


    let sourceWidth =
        screenRect.width / scale;


    let sourceHeight =
        screenRect.height / scale;


    sourceX =
        Math.max(
            0,
            Math.min(
                sourceX,
                videoWidth - 1
            )
        );


    sourceY =
        Math.max(
            0,
            Math.min(
                sourceY,
                videoHeight - 1
            )
        );


    sourceWidth =
        Math.min(
            sourceWidth,
            videoWidth - sourceX
        );


    sourceHeight =
        Math.min(
            sourceHeight,
            videoHeight - sourceY
        );


    return {

        x: sourceX,

        y: sourceY,

        width: sourceWidth,

        height: sourceHeight

    };

}



/* =============================
   評価領域画像取得
============================= */


function captureEvaluationArea() {

    if (

        video.readyState < 2 ||

        video.videoWidth === 0

    ) {

        return null;

    }


    const screenRect =
        evaluationArea
            .getBoundingClientRect();


    const sourceRect =
        screenRectToVideoRect(
            screenRect
        );


    canvas.width =
        ANALYSIS_SIZE;


    canvas.height =
        ANALYSIS_SIZE;


    ctx.drawImage(

        video,

        sourceRect.x,

        sourceRect.y,

        sourceRect.width,

        sourceRect.height,

        0,

        0,

        ANALYSIS_SIZE,

        ANALYSIS_SIZE

    );


    return ctx.getImageData(

        0,

        0,

        ANALYSIS_SIZE,

        ANALYSIS_SIZE

    );

}



/* =============================
   RGB → 輝度配列
============================= */


function imageDataToBrightnessArray(imageData) {

    const data =
        imageData.data;


    const brightnessArray =
        new Float32Array(

            ANALYSIS_SIZE *

            ANALYSIS_SIZE

        );


    let pixelIndex = 0;


    for (

        let i = 0;

        i < data.length;

        i += 4

    ) {

        const r =
            data[i];


        const g =
            data[i + 1];


        const b =
            data[i + 2];


        brightnessArray[pixelIndex] =

            0.2126 * r +

            0.7152 * g +

            0.0722 * b;


        pixelIndex++;

    }


    return brightnessArray;

}



/* =============================
   1つのボタンで状態遷移
============================= */


actionButton.addEventListener(

    "click",

    () => {


        if (
            currentState ===
            "baseline"
        ) {

            recordBaseline();

        }


        else if (
            currentState ===
            "measure"
        ) {

            measureShadow();

        }


        else if (
            currentState ===
            "result"
        ) {

            resetForNextCondition();

        }

    }

);



/* =============================
   基準測定
============================= */


function recordBaseline() {

    const imageData =
        captureEvaluationArea();


    if (!imageData) {

        alert(
            "カメラ画像を取得できません。"
        );

        return;

    }


    baselineBrightnessArray =
        imageDataToBrightnessArray(
            imageData
        );


    currentState =
        "measure";


    actionButton.textContent =
        "測定";


    statusDisplay.textContent =
        "ペン先を十字に合わせ、通常の書字姿勢をとってください。";


    messageDisplay.textContent =
        "ペン先を十字に合わせて測定";


    judgementBox.style.display =
        "none";


    darkAreaRateDisplay.textContent =
        "---";


    averageDropRateDisplay.textContent =
        "---";

}



/* =============================
   測定
============================= */


function measureShadow() {

    if (
        baselineBrightnessArray ===
        null
    ) {

        return;

    }


    const imageData =
        captureEvaluationArea();


    if (!imageData) {

        alert(
            "カメラ画像を取得できません。"
        );

        return;

    }


    const measuredBrightnessArray =
        imageDataToBrightnessArray(
            imageData
        );


    analyzeDifference(

        baselineBrightnessArray,

        measuredBrightnessArray

    );


    currentState =
        "result";


    actionButton.textContent =
        "次の条件を測定";

}



/* =============================
   画像比較・判定
============================= */


function analyzeDifference(

    baseline,

    measured

) {


    let darkPixelCount = 0;

    let darkPixelDropTotal = 0;

    let validPixelCount = 0;


    const totalPixelCount =
        baseline.length;


    for (

        let i = 0;

        i < totalPixelCount;

        i++

    ) {


        const baseBrightness =
            baseline[i];


        const measuredBrightness =
            measured[i];


        /*

        極端に暗い基準画素は除外

        */

        if (
            baseBrightness < 10
        ) {

            continue;

        }


        validPixelCount++;


        const dropRate =

            (

                baseBrightness -

                measuredBrightness

            )

            /

            baseBrightness;


        if (
            dropRate >=
            DARK_THRESHOLD
        ) {

            darkPixelCount++;


            darkPixelDropTotal +=
                dropRate;

        }

    }



    let darkAreaRate = 0;


    if (
        validPixelCount > 0
    ) {

        darkAreaRate =

            darkPixelCount

            /

            validPixelCount

            *

            100;

    }



    let averageDropRate = 0;


    if (
        darkPixelCount > 0
    ) {

        averageDropRate =

            darkPixelDropTotal

            /

            darkPixelCount

            *

            100;

    }



    const influenceScore =

        darkAreaRate

        *

        averageDropRate

        /

        100;



    darkAreaRateDisplay.textContent =

        darkAreaRate
            .toFixed(1)

        +

        " %";



    averageDropRateDisplay.textContent =

        averageDropRate
            .toFixed(1)

        +

        " %";



    scoreDisplay.textContent =

        "影響スコア："

        +

        influenceScore
            .toFixed(1);



    let judgementText;



    if (

        influenceScore <

        SMALL_SCORE_THRESHOLD

    ) {

        judgementText =
            "影の影響：小";

    }


    else if (

        influenceScore <

        LARGE_SCORE_THRESHOLD

    ) {

        judgementText =
            "影の影響：中";

    }


    else {

        judgementText =
            "影の影響：大";

    }



    judgementDisplay.textContent =
        judgementText;



    judgementBox.style.display =
        "block";



    statusDisplay.textContent =

        "測定完了。結果を確認してください。";



    messageDisplay.textContent =

        judgementText +
        "（暫定判定）";

}



/* =============================
   次の条件
============================= */


function resetForNextCondition() {


    baselineBrightnessArray =
        null;


    currentState =
        "baseline";


    actionButton.textContent =
        "基準を測定";


    statusDisplay.textContent =
        "照明位置を変更し、手とペンを外して基準を測定してください。";


    messageDisplay.textContent =
        "手・ペンなしで基準を測定";


    darkAreaRateDisplay.textContent =
        "---";


    averageDropRateDisplay.textContent =
        "---";


    judgementBox.style.display =
        "none";

}



/* =============================
   画面回転
============================= */


window.addEventListener(

    "orientationchange",

    () => {

        setTimeout(

            () => {

                window.scrollTo(0, 0);

            },

            300

        );

    }

);



/* =============================
   開始
============================= */


startCamera();


</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width,
             initial-scale=1.0,
             viewport-fit=cover"
>

<title>ShadowGuide</title>

<style>

/* =============================
   基本
============================= */

html,
body {
    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    overflow: hidden;

    background: black;

    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        Arial,
        sans-serif;
}


/* =============================
   カメラ
============================= */

#camera {
    position: fixed;

    top: 0;
    left: 0;

    width: 100vw;
    height: 100vh;

    object-fit: cover;

    z-index: 0;
}


/* =============================
   操作パネル
============================= */

#panel {
    position: fixed;

    z-index: 20;

    box-sizing: border-box;

    background: rgba(0, 0, 0, 0.72);

    color: white;

    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
}


#topRow {
    display: flex;

    align-items: center;
    justify-content: space-between;

    gap: 10px;
}


#title {
    font-size: 21px;
    font-weight: 700;

    white-space: nowrap;
}


#baselineButton {
    padding: 9px 14px;

    border: none;
    border-radius: 9px;

    background: white;
    color: black;

    font-size: 15px;
    font-weight: 700;

    white-space: nowrap;
}


#values {
    display: flex;

    margin-top: 8px;

    gap: 15px;
}


.valueBox {
    min-width: 0;
}


.valueLabel {
    font-size: 11px;

    opacity: 0.75;

    margin-bottom: 2px;
}


.value {
    font-size: 18px;
    font-weight: 600;

    white-space: nowrap;
}


/* =============================
   評価領域
============================= */

#evaluationArea {
    position: fixed;

    z-index: 10;

    box-sizing: border-box;

    border: 4px solid yellow;

    pointer-events: none;
}


#areaLabel {
    position: absolute;

    top: -29px;
    left: -4px;

    color: yellow;

    font-size: 16px;
    font-weight: 700;

    text-shadow:
        0 0 4px black,
        0 0 4px black,
        0 0 4px black;
}


/* =============================
   判定表示
============================= */

#shadowLevel {
    position: fixed;

    z-index: 15;

    box-sizing: border-box;

    padding: 8px 14px;

    border-radius: 10px;

    background: rgba(0, 0, 0, 0.72);

    color: white;

    font-size: 18px;
    font-weight: 700;

    text-align: center;

    pointer-events: none;
}


/* =============================
   Canvas
============================= */

#analysisCanvas {
    display: none;
}


/* =============================
   縦画面
============================= */

@media (orientation: portrait) {

    #panel {
        top: 0;
        left: 0;

        width: 100%;

        padding:
            calc(10px + env(safe-area-inset-top))
            14px
            10px
            14px;
    }


    #evaluationArea {
        width: min(62vw, 280px);
        height: min(62vw, 280px);

        left: 50%;
        top: 54%;

        transform: translate(-50%, -50%);
    }


    #shadowLevel {
        left: 50%;
        top: calc(54% + min(31vw, 140px) + 18px);

        transform: translateX(-50%);

        min-width: 180px;
    }

}


/* =============================
   横画面
============================= */

@media (orientation: landscape) {

    #panel {
        top: 0;
        left: 0;

        width: 250px;
        height: 100%;

        padding:
            calc(12px + env(safe-area-inset-top))
            14px
            calc(12px + env(safe-area-inset-bottom))
            calc(14px + env(safe-area-inset-left));
    }


    #topRow {
        display: block;
    }


    #baselineButton {
        margin-top: 12px;

        width: 100%;
    }


    #values {
        display: block;

        margin-top: 14px;
    }


    .valueBox {
        margin-bottom: 10px;
    }


    .valueLabel {
        font-size: 11px;
    }


    .value {
        font-size: 19px;
    }


    #evaluationArea {
        width: min(42vh, 270px);
        height: min(42vh, 270px);

        left: calc(
            250px +
            (100vw - 250px) / 2
        );

        top: 48%;

        transform: translate(-50%, -50%);
    }


    #shadowLevel {
        left: calc(
            250px +
            (100vw - 250px) / 2
        );

        top: calc(
            48% +
            min(21vh, 135px) +
            18px
        );

        transform: translateX(-50%);

        min-width: 190px;
    }

}


/* =============================
   小さい横画面
============================= */

@media
(orientation: landscape)
and (max-height: 500px) {

    #panel {
        width: 220px;
    }


    #title {
        font-size: 18px;
    }


    #baselineButton {
        padding: 7px 10px;

        font-size: 13px;
    }


    #values {
        margin-top: 8px;
    }


    .valueBox {
        margin-bottom: 6px;
    }


    .value {
        font-size: 16px;
    }


    #evaluationArea {
        width: min(48vh, 220px);
        height: min(48vh, 220px);

        left: calc(
            220px +
            (100vw - 220px) / 2
        );
    }


    #shadowLevel {
        left: calc(
            220px +
            (100vw - 220px) / 2
        );

        top: auto;
        bottom: calc(
            8px +
            env(safe-area-inset-bottom)
        );

        padding: 6px 12px;

        font-size: 15px;
    }

}

</style>
</head>


<body>


<video
    id="camera"
    autoplay
    playsinline
    muted>
</video>


<div id="panel">

    <div id="topRow">

        <div id="title">
            ShadowGuide
        </div>

        <button id="baselineButton">
            基準を記録
        </button>

    </div>


    <div id="values">

        <div class="valueBox">

            <div class="valueLabel">
                現在輝度
            </div>

            <div
                class="value"
                id="currentBrightness">
                ---
            </div>

        </div>


        <div class="valueBox">

            <div class="valueLabel">
                基準輝度
            </div>

            <div
                class="value"
                id="baselineBrightness">
                ---
            </div>

        </div>


        <div class="valueBox">

            <div class="valueLabel">
                輝度低下率
            </div>

            <div
                class="value"
                id="dropRate">
                ---
            </div>

        </div>

    </div>

</div>



<div id="evaluationArea">

    <div id="areaLabel">
        評価領域
    </div>

</div>



<div id="shadowLevel">

    基準を記録してください

</div>



<canvas id="analysisCanvas"></canvas>



<script>


const video =
    document.getElementById("camera");


const evaluationArea =
    document.getElementById("evaluationArea");


const canvas =
    document.getElementById("analysisCanvas");


const ctx =
    canvas.getContext(
        "2d",
        {
            willReadFrequently: true
        }
    );


const currentBrightnessDisplay =
    document.getElementById(
        "currentBrightness"
    );


const baselineBrightnessDisplay =
    document.getElementById(
        "baselineBrightness"
    );


const dropRateDisplay =
    document.getElementById(
        "dropRate"
    );


const baselineButton =
    document.getElementById(
        "baselineButton"
    );


const shadowLevelDisplay =
    document.getElementById(
        "shadowLevel"
    );



let currentBrightness = 0;

let baselineBrightness = null;



/* =============================
   カメラ起動
============================= */


async function startCamera() {

    try {

        const stream =
            await navigator.mediaDevices
                .getUserMedia({

                    video: {

                        facingMode: {
                            ideal: "environment"
                        }

                    },

                    audio: false

                });


        video.srcObject = stream;


        await video.play();


        requestAnimationFrame(
            analyzeBrightness
        );

    }

    catch(error) {

        alert(
            "カメラを起動できませんでした。\n" +
            "カメラの使用を許可してください。"
        );


        console.error(error);

    }

}



/* =============================
   輝度計算
============================= */


function calculateBrightness(
    imageData
) {

    const data =
        imageData.data;


    let total = 0;

    let count = 0;


    /*
    4画素ごとにサンプリング
    */

    for (
        let i = 0;
        i < data.length;
        i += 16
    ) {

        const r = data[i];

        const g = data[i + 1];

        const b = data[i + 2];


        const brightness =

            0.2126 * r +

            0.7152 * g +

            0.0722 * b;


        total += brightness;

        count++;

    }


    return total / count;

}



/* =============================
   画面座標
   ↓
   video元画像座標へ変換

   object-fit: cover 対応
============================= */


function screenRectToVideoRect(
    screenRect
) {

    const videoWidth =
        video.videoWidth;


    const videoHeight =
        video.videoHeight;


    const screenWidth =
        window.innerWidth;


    const screenHeight =
        window.innerHeight;



    /*
    object-fit: cover の倍率
    */

    const scale = Math.max(

        screenWidth / videoWidth,

        screenHeight / videoHeight

    );



    /*
    画面上に表示されている
    videoの実サイズ
    */

    const displayedWidth =
        videoWidth * scale;


    const displayedHeight =
        videoHeight * scale;



    /*
    coverによって
    切り取られた量
    */

    const cropX =

        (
            displayedWidth -
            screenWidth
        ) / 2;


    const cropY =

        (
            displayedHeight -
            screenHeight
        ) / 2;



    /*
    評価領域の画面座標
    ↓
    video元画像座標
    */

    let sourceX =

        (
            screenRect.left +
            cropX
        ) / scale;


    let sourceY =

        (
            screenRect.top +
            cropY
        ) / scale;


    let sourceWidth =

        screenRect.width / scale;


    let sourceHeight =

        screenRect.height / scale;



    /*
    安全のため範囲制限
    */

    sourceX =
        Math.max(
            0,
            Math.min(
                sourceX,
                videoWidth - 1
            )
        );


    sourceY =
        Math.max(
            0,
            Math.min(
                sourceY,
                videoHeight - 1
            )
        );


    sourceWidth =
        Math.min(
            sourceWidth,
            videoWidth - sourceX
        );


    sourceHeight =
        Math.min(
            sourceHeight,
            videoHeight - sourceY
        );


    return {

        x: sourceX,

        y: sourceY,

        width: sourceWidth,

        height: sourceHeight

    };

}



/* =============================
   リアルタイム解析
============================= */


function analyzeBrightness() {


    if (

        video.readyState >= 2 &&

        video.videoWidth > 0 &&

        video.videoHeight > 0

    ) {


        /*
        黄色い評価領域の
        画面上の位置を取得
        */

        const screenRect =

            evaluationArea
                .getBoundingClientRect();



        /*
        video元画像上の位置へ変換
        */

        const sourceRect =

            screenRectToVideoRect(
                screenRect
            );



        /*
        解析用Canvasは
        小さめ固定サイズ
        */

        const analysisWidth = 160;

        const analysisHeight = 160;


        canvas.width =
            analysisWidth;


        canvas.height =
            analysisHeight;



        /*
        黄色い枠と一致する領域を
        Canvasへ描画
        */

        ctx.drawImage(

            video,

            sourceRect.x,

            sourceRect.y,

            sourceRect.width,

            sourceRect.height,

            0,

            0,

            analysisWidth,

            analysisHeight

        );



        const imageData =

            ctx.getImageData(

                0,

                0,

                analysisWidth,

                analysisHeight

            );



        currentBrightness =

            calculateBrightness(
                imageData
            );



        currentBrightnessDisplay
            .textContent =

            currentBrightness
                .toFixed(1);



        updateShadowEvaluation();

    }



    requestAnimationFrame(
        analyzeBrightness
    );

}



/* =============================
   基準記録
============================= */


baselineButton
    .addEventListener(

        "click",

        () => {


            baselineBrightness =

                currentBrightness;



            baselineBrightnessDisplay
                .textContent =

                baselineBrightness
                    .toFixed(1);



            dropRateDisplay
                .textContent =

                "0.0 %";



            shadowLevelDisplay
                .textContent =

                "基準を記録しました";

        }

    );



/* =============================
   影評価
============================= */


function updateShadowEvaluation() {


    if (
        baselineBrightness === null
    ) {

        return;

    }



    let dropRate =

        (

            baselineBrightness -

            currentBrightness

        )

        /

        baselineBrightness

        *

        100;



    if (dropRate < 0) {

        dropRate = 0;

    }



    dropRateDisplay
        .textContent =

        dropRate.toFixed(1) +
        " %";



    if (dropRate < 5) {

        shadowLevelDisplay
            .textContent =

            "影の影響：小";

    }


    else if (dropRate < 15) {

        shadowLevelDisplay
            .textContent =

            "影の影響：中";

    }


    else {

        shadowLevelDisplay
            .textContent =

            "影の影響：大";

    }

}



/* =============================
   画面回転時
============================= */


window.addEventListener(

    "orientationchange",

    () => {

        /*
        Safariでレイアウト確定を待つ
        */

        setTimeout(

            () => {

                window.scrollTo(0, 0);

            },

            300

        );

    }

);



/* =============================
   開始
============================= */


startCamera();


</script>


</body>
</html>
